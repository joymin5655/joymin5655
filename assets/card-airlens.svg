<svg xmlns="http://www.w3.org/2000/svg" width="430" height="210" viewBox="0 0 430 210" role="img" aria-label="AirLens — 대기질 인텔리전스 SaaS, 단독 개발, 라이브. 1,261 커밋, 50+ 개국, ML 엔진 5, GPT-4o 에이전트">
  <defs>
    <linearGradient id="alBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1b27"/>
      <stop offset="1" stop-color="#16161e"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="428" height="208" rx="14" fill="url(#alBg)" stroke="#2a2f45"/>

  <!-- title + live pulse -->
  <text x="24" y="42" font-family="'Segoe UI','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui,sans-serif" font-size="22" font-weight="800" fill="#c0caf5">AirLens</text>
  <circle cx="122" cy="35" r="4" fill="#28c840"/>
  <circle cx="122" cy="35" r="4" fill="none" stroke="#28c840">
    <animate attributeName="r" values="4;11" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.7;0" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="134" y="40" font-family="'SF Mono','Fira Code',Menlo,monospace" font-size="10.5" font-weight="700" fill="#28c840">LIVE</text>

  <text x="24" y="66" font-family="'Segoe UI','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui,sans-serif" font-size="11.5" fill="#8a93b5">대기질 인텔리전스 SaaS · 단독 개발</text>

  <!-- mini globe -->
  <g transform="translate(352,92)" fill="none" stroke="#3b4261" stroke-width="1">
    <circle r="38" stroke="#2f3450"/>
    <ellipse rx="38" ry="13"/>
    <ellipse rx="34" ry="38">
      <animate attributeName="rx" values="34;4;34" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <circle r="2.4" fill="#25E2F4" stroke="none">
      <animateMotion path="M -50 13 A 50 18 0 1 1 50 -13 A 50 18 0 1 1 -50 13 Z" dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- stats -->
  <g font-family="'Segoe UI','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui,sans-serif" font-size="12" fill="#9aa5ce">
    <text x="24" y="100"><tspan fill="#25E2F4" font-weight="700">1,261</tspan> commits · <tspan fill="#25E2F4" font-weight="700">50+</tspan> countries</text>
    <text x="24" y="121"><tspan fill="#25E2F4" font-weight="700">10+</tspan> sources · <tspan fill="#25E2F4" font-weight="700">5</tspan> ML engines · GPT-4o agent</text>
  </g>

  <!-- tech chips -->
  <g font-family="'SF Mono','Fira Code',Menlo,monospace" font-size="10" fill="#7aa2f7">
    <rect x="24" y="146" width="58" height="20" rx="10" fill="#16161e" stroke="#2a2f45"/><text x="53" y="159.5" text-anchor="middle">GPT-4o</text>
    <rect x="90" y="146" width="62" height="20" rx="10" fill="#16161e" stroke="#2a2f45"/><text x="121" y="159.5" text-anchor="middle">FastAPI</text>
    <rect x="160" y="146" width="70" height="20" rx="10" fill="#16161e" stroke="#2a2f45"/><text x="195" y="159.5" text-anchor="middle">Supabase</text>
    <rect x="238" y="146" width="64" height="20" rx="10" fill="#16161e" stroke="#2a2f45"/><text x="270" y="159.5" text-anchor="middle">React 19</text>
    <rect x="310" y="146" width="46" height="20" rx="10" fill="#16161e" stroke="#2a2f45"/><text x="333" y="159.5" text-anchor="middle">ONNX</text>
  </g>

  <text x="24" y="190" font-family="'SF Mono','Fira Code',Menlo,monospace" font-size="11" fill="#7aa2f7">→ github.com/joymin5655/AirLens<animate attributeName="opacity" values="1;0.55;1" dur="3s" repeatCount="indefinite"/></text>
</svg>
