  <g class="mono" font-size="12">
    <text x="24" y="120" fill="#D7FF3F">66,307 <tspan fill="#7E8798" font-size="10">req/30d*</tspan>  <tspan fill="#EDEFF4">55</tspan> <tspan fill="#7E8798" font-size="10">countries</tspan>  <tspan fill="#EDEFF4">10</tspan> <tspan fill="#7E8798" font-size="10">sources</tspan>  <tspan fill="#EDEFF4">5</tspan> <tspan fill="#7E8798" font-size="10">ML</tspan></text>
