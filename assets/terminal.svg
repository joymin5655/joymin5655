      <text x="24" y="122" fill="#43D9AD">$ <tspan fill="#EDEFF4">airlens observe --window 30d</tspan></text>
    </g>
    <g>
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.87;1" dur="2.4s" begin="0s" fill="freeze"/>
