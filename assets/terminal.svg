      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.94;1" dur="5s" begin="0s" fill="freeze"/>
      <text x="24" y="286" fill="#43D9AD">$ <tspan fill="#EDEFF4">gitleaks detect --full-history</tspan></text>
