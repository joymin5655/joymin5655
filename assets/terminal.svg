      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.91;1" dur="3.4s" begin="0s" fill="freeze"/>
      <text x="24" y="204" fill="#43D9AD">$ <tspan fill="#EDEFF4">agent enforce --runtime all</tspan></text>
    </g>
    <g>
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.925;1" dur="4s" begin="0s" fill="freeze"/>
      <text x="24" y="228" fill="#8A93A6">▸ <tspan fill="#EDEFF4">3</tspan> runtimes · <tspan fill="#EDEFF4">17</tspan> hooks · <tspan fill="#FF6B4A">296</tspan> high-risk ops blocked · <tspan fill="#43D9AD">0</tspan> false positives</text>
