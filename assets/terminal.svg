<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" role="img" aria-label="terminal demo. whoami: AI Agent · Infrastructure Engineer. airlens observe 30d: 66,307 requests, 55 countries (requests, not users), 10 data sources, 5 ML engines, 35 edge functions. agent enforce: 3 runtimes, 17 hooks, 296 high-risk ops blocked, 0 false positives. gitleaks: 1,402 commits scanned, 0 leaks">
