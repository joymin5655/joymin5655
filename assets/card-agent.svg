<svg xmlns="http://www.w3.org/2000/svg" width="430" height="210" viewBox="0 0 430 210" role="img" aria-label="Agent — 멀티런타임 거버넌스 하네스, MIT 오픈소스. Claude, Codex, Gemini 3개 런타임을 단일 YAML 정책으로 통제. 훅 24, 에이전트 6, 스킬 8">
  <defs>
    <linearGradient id="agBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1b27"/>
      <stop offset="1" stop-color="#16161e"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="428" height="208" rx="14" fill="url(#agBg)" stroke="#2a2f45"/>

  <!-- title + MIT chip -->
  <text x="24" y="42" font-family="'Segoe UI','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui,sans-serif" font-size="22" font-weight="800" fill="#c0caf5">Agent</text>
  <rect x="102" y="26" width="62" height="19" rx="9.5" fill="#16161e" stroke="#2a2f45"/>
  <text x="133" y="39" text-anchor="middle" font-family="'SF Mono','Fira Code',Menlo,monospace" font-size="9.5" font-weight="700" fill="#9ece6a">MIT OSS</text>

  <text x="24" y="66" font-family="'Segoe UI','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui,sans-serif" font-size="11.5" fill="#8a93b5">멀티런타임 거버넌스 하네스 · Policy-as-Code</text>

  <!-- hub-and-spoke diagram -->
  <g font-family="'SF Mono','Fira Code',Menlo,monospace" font-size="9" fill="#8a93b5">
    <line x1="345" y1="102" x2="285" y2="46" stroke="#2a2f45" stroke-width="1"/>
    <line x1="345" y1="102" x2="412" y2="70" stroke="#2a2f45" stroke-width="1"/>
    <line x1="345" y1="102" x2="372" y2="152" stroke="#2a2f45" stroke-width="1"/>
    <circle cx="285" cy="46" r="5" fill="#16161e" stroke="#7aa2f7"/>
    <circle cx="412" cy="70" r="5" fill="#16161e" stroke="#38bdae"/>
    <circle cx="372" cy="152" r="5" fill="#16161e" stroke="#e0af68"/>
    <text x="285" y="34" text-anchor="middle" fill="#7aa2f7">Claude</text>
    <text x="412" y="58" text-anchor="middle" fill="#38bdae">Codex</text>
    <text x="372" y="168" text-anchor="middle" fill="#e0af68">Gemini</text>
    <!-- policy pulses hub → nodes -->
    <circle r="2.2" fill="#bb9af7">
      <animateMotion path="M 345 102 L 285 46" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.2" fill="#bb9af7">
      <animateMotion path="M 345 102 L 412 70" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.2" fill="#bb9af7">
      <animateMotion path="M 345 102 L 372 152" dur="1.8s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <rect x="315" y="89" width="60" height="26" rx="8" fill="#16161e" stroke="#bb9af7"/>
    <text x="345" y="106" text-anchor="middle" font-size="10" font-weight="700" fill="#bb9af7">YAML</text>
  </g>

  <!-- stats -->
  <g font-family="'Segoe UI','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',system-ui,sans-serif" font-size="12" fill="#9aa5ce">
    <text x="24" y="100"><tspan fill="#bb9af7" font-weight="700">24</tspan> hooks · <tspan fill="#bb9af7" font-weight="700">6</tspan> agents · <tspan fill="#bb9af7" font-weight="700">8</tspan> skills</text>
    <text x="24" y="121">다층 시크릿 방어 · 원자적 세션 락</text>
  </g>

  <!-- tech chips -->
  <g font-family="'SF Mono','Fira Code',Menlo,monospace" font-size="10" fill="#bb9af7">
    <rect x="24" y="146" width="104" height="20" rx="10" fill="#16161e" stroke="#2a2f45"/><text x="76" y="159.5" text-anchor="middle">Policy-as-Code</text>
    <rect x="136" y="146" width="64" height="20" rx="10" fill="#16161e" stroke="#2a2f45"/><text x="168" y="159.5" text-anchor="middle">gitleaks</text>
    <rect x="208" y="146" width="88" height="20" rx="10" fill="#16161e" stroke="#2a2f45"/><text x="252" y="159.5" text-anchor="middle">CC Plugin</text>
  </g>

  <text x="24" y="190" font-family="'SF Mono','Fira Code',Menlo,monospace" font-size="11" fill="#bb9af7">→ github.com/joymin5655/Agent<animate attributeName="opacity" values="1;0.55;1" dur="3s" repeatCount="indefinite"/></text>
</svg>
